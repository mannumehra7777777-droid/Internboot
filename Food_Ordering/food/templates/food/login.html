<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zesty Bites | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff4757; --glass: rgba(255, 255, 255, 0.85); }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; 
            background: url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat fixed;
            display: flex; align-items: center; justify-content: center; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1; }
        .login-card { position: relative; z-index: 2; background: var(--glass); backdrop-filter: blur(15px); 
            padding: 50px; border-radius: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.2); 
            width: 100%; max-width: 400px; text-align: center; transition: 0.4s; }
        .login-card:hover { transform: translateY(-10px); }
        h2 { font-weight: 800; color: #2d3436; font-size: 32px; margin-bottom: 10px; }
        input { width: 100%; padding: 16px; margin: 12px 0; border: 2px solid transparent; border-radius: 15px; 
            background: white; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(255, 71, 87, 0.2); }
        .btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; 
            border-radius: 15px; font-weight: 700; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .btn:hover { background: #ff6b81; transform: scale(1.02); box-shadow: 0 10px 20px rgba(255, 71, 87, 0.4); }
        .footer-text { margin-top: 25px; color: #636e72; font-size: 14px; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="login-card">
        <h2>Welcome Back</h2>
        <p style="color: #636e72;">Deliciousness is just a login away.</p>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn">Sign In</button>
        </form>
        <div class="footer-text">Don't have an account? <a href="{% url 'signup' %}">Join the Feast</a></div>
    </div>
</body>
</html>
