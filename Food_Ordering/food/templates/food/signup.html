<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zesty Bites | Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        .main-wrapper { display: flex; height: 100vh; }
        .visual-side { flex: 1.2; background: url('https://images.unsplash.com/photo-1567620905732-2d1ec7bb7445?auto=format&fit=crop&w=1000&q=80') center/cover; position: relative; }
        .visual-side::after { content: ""; position: absolute; width: 100%; height: 100%; background: linear-gradient(to right, rgba(0,0,0,0.6), transparent); }
        .form-side { flex: 0.8; background: #fff; display: flex; align-items: center; justify-content: center; padding: 60px; overflow-y: auto; }
        .form-container { width: 100%; max-width: 400px; animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        h2 { font-size: 36px; color: #ff4757; font-weight: 800; margin-bottom: 5px; }
        form p { margin-bottom: 15px; text-align: left; }
        input { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 12px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #ff4757; background: #fff5f6; }
        .helptext { font-size: 11px; color: #a4b0be; display: block; margin-top: 5px; }
        .signup-btn { width: 100%; padding: 16px; background: #2f3542; color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .signup-btn:hover { background: #ff4757; box-shadow: 0 8px 25px rgba(255, 71, 87, 0.3); }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="visual-side"></div>
        <div class="form-side">
            <div class="form-container">
                <h2>Join Zesty.</h2>
                <p style="color: #747d8c; margin-bottom: 30px;">Your favorite meals are waiting.</p>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="signup-btn">Create Free Account</button>
                </form>
                <p style="text-align:center; margin-top: 30px; font-size: 14px;">Member? <a href="{% url 'login' %}" style="color: #ff4757; font-weight: 700; text-decoration: none;">Log In</a></p>
            </div>
        </div>
    </div>
</body>
</html>
